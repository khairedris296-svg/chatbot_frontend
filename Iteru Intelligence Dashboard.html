<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iteru Intelligence | لوحة التحكم</title>
    
    <!-- خطوط جوجل (Tajawal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- استدعاء Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Tajawal', 'sans-serif'], },
                    colors: {
                        supa: {
                            bg: '#0f1115', panel: '#16191f', border: '#262b36',
                            green: '#3ECF8E', greenDim: '#3ECF8E15', textMain: '#EDEDED', textMuted: '#8B92A5'
                        },
                        iteru: { gold: '#D4AF37', blue: '#4A90E2' }
                    }
                }
            }
        }
    </script>
    
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { background-color: #0f1115; }
        
        /* تصميم شريط التمرير الأساسي */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #262b36; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4A90E2; }

        /* إخفاء شريط التمرير للكاروسيل (المنتجات) ليكون شكله أنظف */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(62, 207, 142, 0); }
            100% { box-shadow: 0 0 0 0 rgba(62, 207, 142, 0); }
        }
        .live-indicator { width: 8px; height: 8px; background-color: #3ECF8E; border-radius: 50%; display: inline-block; animation: pulse-green 2s infinite; }
        
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .text-gradient-gold {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text; background-clip: text; color: transparent;
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-supa-textMain antialiased">

    <!-- القائمة الجانبية -->
    <div class="w-1/3 lg:w-1/4 bg-supa-panel border-l border-supa-border flex flex-col z-10 shadow-2xl relative">
        <div class="p-6 border-b border-supa-border flex items-center justify-between bg-supa-panel z-20">
            <h1 class="text-xl font-bold tracking-wide">الطلبات <span class="text-supa-textMuted text-sm font-normal">الواردة</span></h1>
            <div class="flex items-center gap-2 bg-supa-bg px-3 py-1.5 rounded-full border border-supa-border">
                <span class="text-xs text-supa-green font-bold tracking-wider">LIVE</span>
                <span class="live-indicator"></span>
            </div>
        </div>
        
        <div id="sessions-list" class="flex-1 overflow-y-auto p-3 space-y-2 relative z-10">
            <div class="flex flex-col items-center justify-center h-full text-supa-textMuted space-y-3">
                <svg class="animate-spin h-6 w-6 text-iteru-gold" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm">جاري تهيئة النظام...</p>
            </div>
        </div>
    </div>

    <!-- نافذة عرض المحادثة -->
    <div class="flex-1 flex flex-col bg-supa-bg relative">
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-iteru-blue/10 via-supa-bg to-supa-bg opacity-50 pointer-events-none"></div>

        <!-- ترويسة المحادثة -->
        <div class="p-4 md:p-6 border-b border-supa-border bg-supa-panel/60 backdrop-blur-xl z-10 shadow-sm flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-full bg-supa-border/50 border border-supa-border flex items-center justify-center text-supa-textMuted shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
                    </svg>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-white">سجل المحادثة</h2>
                    <p id="current-session-title" class="text-supa-textMuted text-xs font-mono uppercase tracking-wider">يرجى التحديد من القائمة</p>
                </div>
            </div>

            <!-- الهوية التجارية -->
            <div class="opacity-90 hover:opacity-100 transition-opacity cursor-default text-left select-none mr-2">
                <h1 class="text-3xl font-bold tracking-wider text-gradient-gold" style="font-family: Arial, sans-serif; line-height: 1;">Iteru</h1>
                <p class="text-[11px] text-iteru-blue tracking-[0.3em] uppercase mt-1">Intelligence</p>
            </div>
        </div>

        <!-- منطقة الرسائل -->
        <div id="chat-window" class="flex-1 overflow-y-auto p-6 md:p-10 space-y-6 z-10 flex flex-col scroll-smooth">
            <div class="m-auto text-center flex flex-col items-center gap-4 opacity-40">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-supa-textMuted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
                <p class="text-supa-textMuted text-lg tracking-wide">مستعدون لاستقبال الطلبات</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rjdvxomrznnmjlbjlchn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_jukYCu0WhI_J-HpHEqiyLQ_uqMGHrKz';
        const dbApp = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allChats = [];
        let currentActiveSession = null; 
        let currentMessageCount = 0;     

        function formatTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' });
        }

        // خوارزمية تحليل المنتجات واستخراجها من النص
        function parseBotResponse(responseText) {
            const productRegex = /\[PRODUCT\]([\s\S]*?)\[\/PRODUCT\]/g;
            let match;
            let products = [];
            
            // استخراج كل منتج
            while ((match = productRegex.exec(responseText)) !== null) {
                let prodStr = match[1];
                
                let nameMatch = prodStr.match(/Name:\s*([\s\S]*?)\s*Price:/);
                let priceMatch = prodStr.match(/Price:\s*([\s\S]*?)\s*Desc:/);
                let descMatch = prodStr.match(/Desc:\s*([\s\S]*?)\s*Image:/);
                let imageMatch = prodStr.match(/Image:\s*([\s\S]*?)\s*Link:/);
                let linkMatch = prodStr.match(/Link:\s*([\s\S]*?)$/);

                if (nameMatch) {
                    products.push({
                        name: nameMatch[1].trim(),
                        price: priceMatch ? priceMatch[1].trim() : '',
                        desc: descMatch ? descMatch[1].trim() : '',
                        image: imageMatch ? imageMatch[1].trim() : '',
                        link: linkMatch ? linkMatch[1].trim() : '#'
                    });
                }
            }
            
            // مسح أكواد المنتجات من النص الأصلي للحصول على رسالة البوت الترحيبية فقط
            let cleanText = responseText.replace(/\[PRODUCT\][\s\S]*?\[\/PRODUCT\]/g, '').trim();
            
            return { text: cleanText, products: products };
        }

        async function fetchChats() {
            const { data, error } = await dbApp.from('chat_logs').select('*').order('created_at', { ascending: true });
            if (error) return;

            allChats = data;
            renderSessions();
            
            if (currentActiveSession) {
                const shortId = currentActiveSession.substring(currentActiveSession.length - 4).toUpperCase();
                renderChatWindow(currentActiveSession, shortId);
            }
        }

        function renderSessions() {
            const sessionsList = document.getElementById('sessions-list');
            const uniqueSessions = [...new Set(allChats.map(chat => chat.session_id))];

            if (uniqueSessions.length === 0) {
                sessionsList.innerHTML = '<p class="text-supa-textMuted text-center mt-10 text-sm">لا يوجد نشاط حالياً</p>';
                return;
            }

            sessionsList.innerHTML = ''; 

            uniqueSessions.reverse().forEach((sessionId) => {
                const shortId = sessionId ? sessionId.substring(sessionId.length - 4).toUpperCase() : "0000";
                const isActive = (sessionId === currentActiveSession);
                
                const sessionDiv = document.createElement('div');
                const baseClasses = 'group p-4 rounded-xl cursor-pointer border transition-colors duration-300 relative overflow-hidden';
                const activeClasses = 'border-iteru-blue/50 bg-supa-panel shadow-[0_0_15px_rgba(74,144,226,0.1)]';
                const inactiveClasses = 'border-supa-border bg-supa-bg hover:border-iteru-blue/30';
                
                sessionDiv.className = `${baseClasses} ${isActive ? activeClasses : inactiveClasses}`;
                
                sessionDiv.innerHTML = `
                    <div class="absolute inset-0 bg-gradient-to-r from-iteru-blue/5 to-transparent ${isActive ? 'translate-x-0' : 'translate-x-full group-hover:translate-x-0'} transition-transform duration-500 ease-out"></div>
                    <div class="relative z-10 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-supa-panel border ${isActive ? 'border-iteru-blue' : 'border-supa-border'} flex items-center justify-center transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ${isActive ? 'text-iteru-blue' : 'text-supa-textMuted group-hover:text-iteru-blue'} transition-colors" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                                </svg>
                            </div>
                            <div>
                                <p class="${isActive ? 'text-white' : 'text-supa-textMain'} font-bold mb-0.5 tracking-wide text-sm transition-colors">زائر المتجر</p>
                                <p class="text-[10px] text-iteru-blue font-mono bg-iteru-blue/10 px-2 py-0.5 rounded border border-iteru-blue/20 inline-block">TICKET #${shortId}</p>
                            </div>
                        </div>
                    </div>
                `;
                
                sessionDiv.onclick = () => {
                    currentActiveSession = sessionId;
                    currentMessageCount = 0; 
                    renderSessions(); 
                    renderChatWindow(sessionId, shortId);
                };
                
                sessionsList.appendChild(sessionDiv);
            });
        }

        function renderChatWindow(sessionId, shortId) {
            const chatWindow = document.getElementById('chat-window');
            const sessionChats = allChats.filter(chat => chat.session_id === sessionId);
            
            document.getElementById('current-session-title').innerText = `SESSION ID: ${sessionId}`;
            
            let newHTML = '';
            sessionChats.forEach((chat) => {
                const time = formatTime(chat.created_at);

                // بناء رسالة العميل
                if(chat.customer_message) {
                    newHTML += `
                        <div class="self-start max-w-[85%] md:max-w-xl mt-2">
                            <div class="flex items-end gap-2">
                                <div class="bg-supa-panel border border-supa-border text-supa-textMain p-4 rounded-2xl rounded-tr-sm shadow-md">
                                    <div class="flex items-center gap-2 mb-2">
                                        <div class="w-2 h-2 rounded-full bg-iteru-blue"></div>
                                        <p class="text-xs text-iteru-blue font-bold">زائر #${shortId}</p>
                                    </div>
                                    <p class="text-sm leading-relaxed">${chat.customer_message}</p>
                                </div>
                            </div>
                            <p class="text-[10px] text-supa-textMuted mt-1 mr-2">${time}</p>
                        </div>
                    `;
                }

                // بناء رسالة البوت (مع تحليل المنتجات)
                if(chat.bot_response) {
                    const parsedData = parseBotResponse(chat.bot_response);
                    
                    // بناء كود بطاقات المنتجات إذا وجدت
                    let productsHTML = '';
                    if (parsedData.products.length > 0) {
                        productsHTML = `
                            <div class="flex gap-3 overflow-x-auto mt-4 pb-2 snap-x no-scrollbar w-full">
                                ${parsedData.products.map(p => `
                                    <div class="min-w-[180px] max-w-[180px] bg-supa-bg border border-supa-border rounded-lg overflow-hidden shrink-0 snap-center shadow-lg relative group flex flex-col">
                                        <div class="h-28 bg-white overflow-hidden relative flex items-center justify-center p-2">
                                            <img src="${p.image}" class="max-w-full max-h-full object-contain mix-blend-multiply group-hover:scale-110 transition-transform duration-300" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                                        </div>
                                        <div class="p-3 flex flex-col flex-1">
                                            <h4 class="text-xs font-bold text-white truncate" title="${p.name}">${p.name}</h4>
                                            <p class="text-[10px] text-supa-textMuted mt-1 line-clamp-2 flex-1" title="${p.desc}">${p.desc}</p>
                                            <div class="flex justify-between items-center mt-3 pt-2 border-t border-supa-border">
                                                <span class="text-xs font-bold text-iteru-gold">${p.price}$</span>
                                                <a href="${p.link}" target="_blank" class="text-[9px] bg-iteru-blue/10 border border-iteru-blue/30 text-iteru-blue px-2 py-1 rounded hover:bg-iteru-blue hover:text-white transition-colors">عرض المنتج</a>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    newHTML += `
                        <div class="self-end max-w-[90%] md:max-w-2xl mt-2 w-full flex flex-col items-end">
                            <div class="flex items-end gap-2 flex-row-reverse w-full justify-end">
                                <div class="bg-gradient-to-br from-supa-panel to-supa-bg border border-iteru-gold/30 text-supa-textMain p-4 rounded-2xl rounded-tl-sm shadow-lg shadow-iteru-gold/5 relative overflow-hidden w-full sm:w-auto">
                                    <div class="absolute top-0 right-0 w-16 h-16 bg-iteru-gold/5 rounded-full blur-xl pointer-events-none"></div>
                                    
                                    <div class="flex items-center justify-end gap-2 mb-3 relative z-10">
                                        <p class="text-xs text-iteru-gold opacity-90 font-bold tracking-wide">الذكاء الاصطناعي Iteru</p>
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-iteru-gold" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                                        </svg>
                                    </div>
                                    
                                    <!-- النص الترحيبي -->
                                    ${parsedData.text ? `<p class="text-sm leading-relaxed relative z-10 text-right">${parsedData.text}</p>` : ''}
                                    
                                    <!-- شريط بطاقات المنتجات -->
                                    ${productsHTML}
                                    
                                </div>
                            </div>
                            <p class="text-[10px] text-supa-textMuted mt-1 ml-2 text-left">${time}</p>
                        </div>
                    `;
                }
            });

            chatWindow.innerHTML = newHTML;

            if (sessionChats.length !== currentMessageCount) {
                setTimeout(() => {
                    chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
                }, 50);
                currentMessageCount = sessionChats.length;
            }
        }

        fetchChats();
        setInterval(fetchChats, 8000); 
    </script>
</body>
</html>
